<!DOCTYPE html>
<html>
<head>
    <title>Health Symptom Analyzer</title>
</head>
<body>
    <h2>Health Symptom Analyzer</h2>

    <form method="POST">
        Fever (0 or 1): <input type="number" name="fever" min="0" max="1" required><br><br>
        Cough (0 or 1): <input type="number" name="cough" min="0" max="1" required><br><br>
        Headache (0 or 1): <input type="number" name="headache" min="0" max="1" required><br><br>
        Vomiting (0 or 1): <input type="number" name="vomiting" min="0" max="1" required><br><br>
        Fatigue (0 or 1): <input type="number" name="fatigue" min="0" max="1" required><br><br>

        <button type="submit">Predict</button>
    </form>

    {% if prediction %}
        <h3>Predicted Disease: {{ prediction }}</h3>
    {% endif %}
</body>
</html>
